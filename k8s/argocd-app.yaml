apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flask-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Rrishiritz/devops-flask-app-cicd.git'
    targetRevision: HEAD
    path: k8s/flask-app
    helm:
      valueFiles:
        - values.yaml
        - values.dockerhub.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: devops-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
