apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  labels:
    app: zookeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
    spec:
      containers:
        - name: zookeeper
          image: ubuntu/zookeeper:3.8-22.04_edge
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 2181
          env:
            - name: ALLOW_ANONYMOUS_LOGIN
              value: "yes"
            - name: ZOO_ENABLE_AUTH
              value: "no"
            - name: ZOO_PORT_NUMBER
              value: "2181"
          volumeMounts:
            - name: zookeeper-data
              mountPath: /var/lib/zookeeper
            - name: zookeeper-config
              mountPath: /etc/zookeeper
      volumes:
        - name: zookeeper-data
          emptyDir: {}
        - name: zookeeper-config
          configMap:
            name: zookeeper-config
